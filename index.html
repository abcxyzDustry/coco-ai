<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Chat - Groq AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.95);
            border-right: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e5e5e5;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
        }

        .conversations-list {
            flex: 1;
            padding: 20px;
        }

        .conversation-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .conversation-item:hover {
            background: #e9ecef;
        }

        .conversation-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .conversation-title {
            font-weight: 500;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .conversation-date {
            font-size: 11px;
            opacity: 0.7;
        }

        .delete-conv {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(220, 53, 69, 0.9);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 12px;
            display: none;
        }

        .conversation-item:hover .delete-conv {
            display: block;
        }

        /* Main Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.95);
        }

        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .model-selector {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.assistant .message-content {
            background: #f8f9fa;
            color: #333;
            border: 1px solid #e5e5e5;
        }

        .message-content pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-content code {
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 4px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e5e5e5;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            font-family: inherit;
        }

        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 12px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="createNewConversation()">+ New Chat</button>
            </div>
            <div class="conversations-list" id="conversationsList">
                <div class="loading">Loading conversations...</div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <h2 id="chatTitle">AI Agent Chat</h2>
                <select class="model-selector" id="modelSelector">
                    <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Best)</option>
                    <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
                    <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
                    <option value="gemma2-9b-it">Gemma 2 9B</option>
                </select>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div style="text-align: center; color: #999; padding: 40px;">
                    <p>👋 Welcome to AI Agent Chat!</p>
                    <p>Start a conversation by sending a message below.</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea class="message-input" id="messageInput" rows="3" placeholder="Type your message here..."></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentConversationId = null;
        let isLoading = false;
        let conversations = [];

        // Load models from API
        async function loadModels() {
            try {
                const response = await fetch('/api/models');
                const models = await response.json();
                const selector = document.getElementById('modelSelector');
                selector.innerHTML = models.map(model => 
                    `<option value="${model.id}">${model.name}</option>`
                ).join('');
            } catch (error) {
                console.error('Error loading models:', error);
            }
        }

        // Load conversations
        async function loadConversations() {
            try {
                const response = await fetch('/api/conversations');
                conversations = await response.json();
                renderConversations();
                
                if (conversations.length > 0 && !currentConversationId) {
                    currentConversationId = conversations[0].id;
                    await loadConversation(currentConversationId);
                }
            } catch (error) {
                console.error('Error loading conversations:', error);
            }
        }

        // Render conversations list
        function renderConversations() {
            const container = document.getElementById('conversationsList');
            if (conversations.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">No conversations yet</div>';
                return;
            }

            container.innerHTML = conversations.map(conv => `
                <div class="conversation-item ${currentConversationId === conv.id ? 'active' : ''}" onclick="switchConversation('${conv.id}')">
                    <div class="conversation-title">${escapeHtml(conv.title || 'New Conversation')}</div>
                    <div class="conversation-date">${new Date(conv.updatedAt).toLocaleDateString()}</div>
                    <button class="delete-conv" onclick="event.stopPropagation(); deleteConversation('${conv.id}')">Delete</button>
                </div>
            `).join('');
        }

        // Switch conversation
        async function switchConversation(conversationId) {
            currentConversationId = conversationId;
            await loadConversation(conversationId);
            renderConversations();
        }

        // Load conversation messages
        async function loadConversation(conversationId) {
            try {
                const response = await fetch(`/api/conversations/${conversationId}`);
                const conversation = await response.json();
                
                document.getElementById('chatTitle').textContent = conversation.title || 'AI Agent Chat';
                
                // Update model selector
                if (conversation.model) {
                    document.getElementById('modelSelector').value = conversation.model;
                }
                
                // Render messages
                const container = document.getElementById('messagesContainer');
                if (!conversation.messages || conversation.messages.length === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; color: #999; padding: 40px;">
                            <p>👋 Welcome to AI Agent Chat!</p>
                            <p>Start a conversation by sending a message below.</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = conversation.messages.map(msg => `
                    <div class="message ${msg.role}">
                        <div class="message-avatar">${msg.role === 'user' ? '👤' : '🤖'}</div>
                        <div class="message-content">${formatMessage(msg.content)}</div>
                    </div>
                `).join('');
                
                scrollToBottom();
            } catch (error) {
                console.error('Error loading conversation:', error);
            }
        }

        // Create new conversation
        async function createNewConversation() {
            try {
                const response = await fetch('/api/conversations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: 'New Conversation' })
                });
                const newConv = await response.json();
                await loadConversations();
                currentConversationId = newConv.id;
                await loadConversation(currentConversationId);
                renderConversations();
            } catch (error) {
                console.error('Error creating conversation:', error);
                alert('Error creating new conversation');
            }
        }

        // Delete conversation
        async function deleteConversation(conversationId) {
            if (!confirm('Are you sure you want to delete this conversation?')) return;
            
            try {
                await fetch(`/api/conversations/${conversationId}`, { method: 'DELETE' });
                
                if (currentConversationId === conversationId) {
                    currentConversationId = null;
                    document.getElementById('messagesContainer').innerHTML = `
                        <div style="text-align: center; color: #999; padding: 40px;">
                            <p>👋 Welcome to AI Agent Chat!</p>
                            <p>Start a conversation by sending a message below.</p>
                        </div>
                    `;
                }
                
                await loadConversations();
            } catch (error) {
                console.error('Error deleting conversation:', error);
                alert('Error deleting conversation');
            }
        }

        // Send message
        async function sendMessage() {
            if (isLoading) return;
            
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content) return;
            
            if (!currentConversationId) {
                await createNewConversation();
            }
            
            isLoading = true;
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            input.value = '';
            
            // Add user message to UI immediately
            addMessageToUI('user', content);
            
            // Show typing indicator
            showTypingIndicator();
            
            try {
                const model = document.getElementById('modelSelector').value;
                const response = await fetch(`/api/conversations/${currentConversationId}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, model })
                });
                
                const data = await response.json();
                removeTypingIndicator();
                addMessageToUI('assistant', data.content);
                
                // Reload conversations to update title if changed
                await loadConversations();
                await loadConversation(currentConversationId);
                
            } catch (error) {
                console.error('Error sending message:', error);
                removeTypingIndicator();
                addMessageToUI('assistant', 'Sorry, there was an error processing your message. Please try again.');
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }

        // Add message to UI
        function addMessageToUI(role, content) {
            const container = document.getElementById('messagesContainer');
            
            // Remove welcome message if exists
            if (container.children.length === 1 && container.children[0].querySelector('div[style*="text-align: center"]')) {
                container.innerHTML = '';
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="message-avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="message-content">${formatMessage(content)}</div>
            `;
            container.appendChild(messageDiv);
            scrollToBottom();
        }

        // Show typing indicator
        function showTypingIndicator() {
            const container = document.getElementById('messagesContainer');
            const indicator = document.createElement('div');
            indicator.className = 'message assistant';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            container.appendChild(indicator);
            scrollToBottom();
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // Format message (basic markdown for code blocks)
        function formatMessage(content) {
            // Simple code block formatting
            content = content.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code class="language-${lang}">${escapeHtml(code)}</code></pre>`;
            });
            
            // Inline code
            content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Bold
            content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            // New lines to <br>
            content = content.replace(/\n/g, '<br>');
            
            return content;
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Scroll to bottom
        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }

        // Enter key to send
        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initialize
        async function init() {
            await loadModels();
            await loadConversations();
        }
        
        init();
    </script>
</body>
</html>
