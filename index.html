<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat - Cloudflare Workers AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:900px;background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);display:flex;flex-direction:column;height:90vh;overflow:hidden}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px}
.badge{background:rgba(255,255,255,.2);padding:6px 12px;border-radius:20px;font-size:12px}
.messages{flex:1;overflow-y:auto;padding:20px;background:#f7f8fc}
.msg{margin-bottom:16px;display:flex}
.msg.user{justify-content:flex-end}
.bubble{max-width:75%;padding:12px 16px;border-radius:16px;white-space:pre-wrap;word-wrap:break-word;line-height:1.5}
.msg.user .bubble{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-bottom-right-radius:4px}
.msg.assistant .bubble{background:#fff;color:#333;border:1px solid #e0e0e0;border-bottom-left-radius:4px}
.welcome{text-align:center;color:#888;margin-top:40px}
.welcome h2{margin-bottom:8px;color:#555}
.input-area{display:flex;gap:10px;padding:16px;background:#fff;border-top:1px solid #eee}
input{flex:1;padding:12px 16px;border:2px solid #e0e0e0;border-radius:24px;font-size:14px;outline:none}
input:focus{border-color:#667eea}
button{padding:12px 24px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:24px;cursor:pointer;font-weight:600}
button:disabled{opacity:.5;cursor:not-allowed}
.typing{color:#888;font-style:italic}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🤖 AI Chat</h1>
    <span class="badge">Cloudflare Workers AI</span>
  </div>
  <div class="messages" id="messages">
    <div class="welcome">
      <h2>👋 Welcome!</h2>
      <p>Start chatting below.</p>
    </div>
  </div>
  <div class="input-area">
    <input id="input" placeholder="Type your message..." autocomplete="off">
    <button id="send">Send</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send");
const history = [];
let welcomeRemoved = false;

function addMessage(role, content) {
  if (!welcomeRemoved) { messagesEl.innerHTML = ""; welcomeRemoved = true; }
  const div = document.createElement("div");
  div.className = "msg " + role;
  const b = document.createElement("div");
  b.className = "bubble";
  b.textContent = content;
  div.appendChild(b);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return b;
}

async function send() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = "";
  sendBtn.disabled = true;

  addMessage("user", text);
  history.push({ role: "user", content: text });
  const bubble = addMessage("assistant", "");
  bubble.classList.add("typing");
  bubble.textContent = "...";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history })
    });
    if (!res.ok || !res.body) throw new Error("HTTP " + res.status);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let full = "", buf = "";
    bubble.textContent = "";
    bubble.classList.remove("typing");

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop() || "";
      for (const line of lines) {
        const l = line.trim();
        if (!l.startsWith("data:")) continue;
        const data = l.slice(5).trim();
        if (data === "[DONE]") continue;
        try {
          const j = JSON.parse(data);
          if (j.response) {
            full += j.response;
            bubble.textContent = full;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
          if (j.error) bubble.textContent = "⚠️ " + j.error;
        } catch {}
      }
    }

    history.push({ role: "assistant", content: full });
  } catch (e) {
    bubble.classList.remove("typing");
    bubble.textContent = "❌ Error: " + e.message;
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

sendBtn.addEventListener("click", send);
inputEl.addEventListener("keydown", e => { if (e.key === "Enter") send(); });
</script>
</body>
</html>
